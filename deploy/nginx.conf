# nginx.conf — Reverse proxy for Odysseus Family Planner
#
# Listens on port 80 and forwards all traffic to uvicorn on port 8000.
# Installed by setup-pi.sh to /etc/nginx/sites-available/odysseus
# and symlinked from /etc/nginx/sites-enabled/odysseus.
#
# To reload after manual edits:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;

    # Respond to the mDNS hostname, the bare hostname, and any other address
    # (e.g. the Pi's IP address typed directly in a browser).
    server_name odysseus.local skylight _;

    # Raise the upload limit to 10 MB so future file-attachment features work.
    client_max_body_size 10M;

    # Proxy everything to the uvicorn backend.
    # The backend serves both the FastAPI (/api/*) and the built React
    # frontend (/) from a single process.
    location / {
        proxy_pass http://127.0.0.1:8000;

        # Support WebSocket upgrades (useful for live-reload in dev,
        # and for any future real-time features).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Pass the real client information to the backend.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't cache responses that contain an Upgrade header (WebSocket).
        proxy_cache_bypass $http_upgrade;

        # Give the backend up to 2 minutes to respond (Google Calendar sync
        # can take a moment on first run).
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
